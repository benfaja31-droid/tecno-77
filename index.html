<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNO 77 - Joke Generator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ffcc;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        button {
            background-color: #00ffcc;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #00cc99;
        }
    </style>
</head>
<body>
    <h1>Joke Generator</h1>
    <button id="jokeButton">Get a Joke</button>
    <p id="joke"></p>
    <script>
        document.getElementById('jokeButton').addEventListener('click', function() {
            fetch('https://v2.jokeapi.dev/joke/Any')
            .then(response => response.json())
            .then(data => {
                const jokeElement = document.getElementById('joke');
                if(data.joke) {
                    jokeElement.innerText = data.joke;
                } else {
                    jokeElement.innerText = `${data.setup} - ${data.delivery}`;
                }
            })
            .catch(error => console.error('Error fetching joke:', error));
        });
    </script>
</body>
</html>
